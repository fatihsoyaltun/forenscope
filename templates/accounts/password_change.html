{% extends 'base.html' %}
{% block title %}Şifre Değiştir — ForenScope{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
  <div style="font-size:16px;font-weight:600;">Şifre Değiştir</div>
  <a href="{% url 'accounts:profile' %}" class="btn-ghost">← Profile Dön</a>
</div>
<div class="fs-panel" style="max-width:500px;">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div style="margin-bottom:16px;">
      <label style="font-size:10px;color:var(--fs-muted);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:6px;">
        {{ field.label }}
      </label>
      {{ field }}
      {% if field.errors %}
      <div style="color:var(--fs-red);font-size:10px;margin-top:4px;">{{ field.errors.0 }}</div>
      {% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn-primary">Şifreyi Güncelle</button>
  </form>
</div>
{% endblock %}
