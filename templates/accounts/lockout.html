<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Hesap Kilitlendi — ForenScope</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --fs-bg:#0f1117; --fs-surface:#1a1d27; --fs-border:rgba(255,255,255,0.08); --fs-text:#e8eaf0; --fs-muted:#8b90a0; --fs-red:#ef4444; }
    body { background:var(--fs-bg); color:var(--fs-text); font-family:'SF Mono',monospace; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body>
  <div style="background:var(--fs-surface);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:40px 36px;max-width:400px;text-align:center;">
    <div style="font-size:32px;margin-bottom:16px;">🔒</div>
    <div style="font-size:16px;font-weight:600;color:var(--fs-red);margin-bottom:10px;">Hesap Geçici Olarak Kilitlendi</div>
    <div style="font-size:12px;color:var(--fs-muted);line-height:1.7;">
      Çok fazla başarısız giriş denemesi yapıldı.<br>
      1 saat sonra tekrar deneyin veya<br>
      sistem yöneticisiyle iletişime geçin.
    </div>
  </div>
</body>
</html>
