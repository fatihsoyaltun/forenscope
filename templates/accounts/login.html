{% extends 'base.html' %}
{% block title %}Giriş — ForenScope{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-xl shadow p-8">
        <h2 class="text-xl font-bold mb-6 text-gray-800">ForenScope Giriş</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit"
                class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded">
                Giriş Yap
            </button>
        </form>
    </div>
</div>
{% endblock %}
