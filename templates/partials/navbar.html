<nav class="bg-gray-900 text-white px-6 py-3 flex items-center justify-between">
    <a href="/" class="text-lg font-semibold tracking-wide">ForenScope</a>
    {% if user.is_authenticated %}
    <div class="flex items-center gap-4">
        <span class="text-sm text-gray-300">{{ user.get_full_name|default:user.username }}</span>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit"
                class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">
                Çıkış
            </button>
        </form>
    </div>
    {% endif %}
</nav>
