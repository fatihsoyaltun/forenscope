{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} — ForenScope Admin{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
:root{--fs-bg:#0f1117;--fs-surface:#13151f;--fs-surface2:#1a1d27;--fs-surface3:#222536;--fs-border:rgba(255,255,255,0.07);--fs-border2:rgba(255,255,255,0.12);--fs-text:#e8eaf0;--fs-muted:#8b90a0;--fs-accent:#4f8ef7;--fs-green:#22c55e;--fs-yellow:#f59e0b;--fs-red:#ef4444;--fs-purple:#7c5ff7}
*,*::before,*::after{box-sizing:border-box}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--fs-bg)}
::-webkit-scrollbar-thumb{background:var(--fs-border2);border-radius:3px}
html,body{background:var(--fs-bg)!important;color:var(--fs-text)!important;font-family:'SF Mono','JetBrains Mono','Menlo',monospace!important;font-size:12px!important}
a{color:var(--fs-accent)!important;text-decoration:none!important}
a:hover{color:#7eb3fa!important}
p,li,td,th,label,span,div{font-family:'SF Mono','JetBrains Mono','Menlo',monospace!important}

#header{background:var(--fs-surface)!important;border-bottom:1px solid var(--fs-border)!important;padding:0 20px!important;height:52px!important;display:flex!important;align-items:center!important;box-shadow:none!important}
#branding h1{font-size:13px!important;font-weight:600!important;letter-spacing:0.04em!important;color:var(--fs-text)!important;margin:0!important;padding:0!important}
#branding h1 a,#branding h1 a:visited{color:var(--fs-text)!important;display:flex!important;align-items:center!important;gap:8px!important}
.fs-logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--fs-accent),var(--fs-purple));border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
#user-tools{font-size:10px!important;color:var(--fs-muted)!important;margin-left:auto!important}
#user-tools a{color:var(--fs-muted)!important}
#user-tools a:hover{color:var(--fs-text)!important}

div.breadcrumbs{background:var(--fs-surface2)!important;border-bottom:1px solid var(--fs-border)!important;padding:8px 20px!important;font-size:10px!important;color:var(--fs-muted)!important}
div.breadcrumbs a{color:var(--fs-accent)!important}

#content-main{background:var(--fs-bg)!important}
#content{background:var(--fs-bg)!important;padding:20px!important}
#content h1{font-size:16px!important;font-weight:600!important;color:var(--fs-text)!important;margin-bottom:16px!important;padding:0!important}

#nav-sidebar{background:var(--fs-surface)!important;border-right:1px solid var(--fs-border)!important;min-width:180px!important}
#nav-sidebar .module{background:transparent!important;border:none!important;border-radius:0!important;margin:0!important}
#nav-sidebar .module h2,#nav-sidebar .module caption{background:transparent!important;color:rgba(139,144,160,0.5)!important;font-size:8px!important;letter-spacing:0.12em!important;padding:12px 14px 4px!important;border-bottom:none!important}
#nav-sidebar a{display:block!important;color:var(--fs-muted)!important;font-size:11px!important;padding:7px 14px!important;border-left:2px solid transparent!important}
#nav-sidebar a:hover{color:var(--fs-text)!important;background:rgba(255,255,255,0.03)!important}
#nav-sidebar .current-app a,#nav-sidebar .current-app .section:link{color:var(--fs-accent)!important;border-left-color:var(--fs-accent)!important;background:rgba(79,142,247,0.06)!important}

.module{background:var(--fs-surface2)!important;border:1px solid var(--fs-border)!important;border-radius:10px!important;margin-bottom:14px!important;overflow:hidden!important;box-shadow:none!important}
.module h2,.module caption{background:var(--fs-surface)!important;color:var(--fs-muted)!important;font-size:9px!important;font-weight:600!important;letter-spacing:0.1em!important;text-transform:uppercase!important;padding:10px 14px!important;border-bottom:1px solid var(--fs-border)!important;border-radius:0!important}
.module h3{color:var(--fs-muted)!important;font-size:9px!important;padding:8px 14px 4px!important;text-transform:uppercase!important;letter-spacing:0.08em!important}
.module table{background:transparent!important}

#changelist{background:var(--fs-surface2)!important;border:1px solid var(--fs-border)!important;border-radius:10px!important;overflow:hidden!important}
#result_list{border:none!important;width:100%!important;border-collapse:collapse!important}
#result_list thead th{background:var(--fs-surface)!important;color:var(--fs-muted)!important;font-size:9px!important;font-weight:500!important;letter-spacing:0.08em!important;text-transform:uppercase!important;padding:10px 12px!important;border-bottom:1px solid var(--fs-border)!important;white-space:nowrap!important}
#result_list thead th a,#result_list thead th a:visited{color:var(--fs-muted)!important}
#result_list thead th.sorted{color:var(--fs-accent)!important}
#result_list thead th.sorted a{color:var(--fs-accent)!important}
#result_list tbody tr{background:var(--fs-surface2)!important}
#result_list tbody tr:hover td{background:rgba(255,255,255,0.025)!important}
#result_list tbody tr.selected td{background:rgba(79,142,247,0.07)!important}
#result_list tbody td{color:var(--fs-text)!important;font-size:11px!important;padding:10px 12px!important;border-bottom:1px solid var(--fs-border)!important;vertical-align:middle!important}
#result_list tbody tr:last-child td{border-bottom:none!important}
#result_list tbody td a{color:var(--fs-accent)!important}

#changelist-search,#toolbar{background:var(--fs-surface)!important;border-bottom:1px solid var(--fs-border)!important;padding:10px 14px!important}
#searchbar{background:var(--fs-surface2)!important;border:1px solid var(--fs-border2)!important;color:var(--fs-text)!important;border-radius:6px!important;padding:6px 10px!important;font-size:11px!important;font-family:inherit!important}
#searchbar:focus{border-color:var(--fs-accent)!important;outline:none!important}

.actions{background:var(--fs-surface)!important;border-bottom:1px solid var(--fs-border)!important;padding:8px 12px!important}
.actions label,.actions span{color:var(--fs-muted)!important;font-size:10px!important}
select#action-select{background:var(--fs-surface2)!important;border:1px solid var(--fs-border2)!important;color:var(--fs-text)!important;border-radius:6px!important;padding:5px 8px!important;font-size:10px!important;font-family:inherit!important}

.paginator{background:var(--fs-surface)!important;border-top:1px solid var(--fs-border)!important;color:var(--fs-muted)!important;font-size:10px!important;padding:8px 14px!important}
.paginator a{color:var(--fs-accent)!important}
.paginator .this-page{color:var(--fs-text)!important;font-weight:600!important}

#changelist-filter{background:var(--fs-surface)!important;border-left:1px solid var(--fs-border)!important;min-width:160px!important}
#changelist-filter h2{background:var(--fs-surface2)!important;color:var(--fs-muted)!important;font-size:9px!important;letter-spacing:0.1em!important;text-transform:uppercase!important;padding:10px 14px!important;border-bottom:1px solid var(--fs-border)!important}
#changelist-filter h3{color:var(--fs-muted)!important;font-size:9px!important;letter-spacing:0.06em!important;text-transform:uppercase!important;padding:10px 14px 4px!important}
#changelist-filter li{border-bottom:1px solid var(--fs-border)!important;padding:0!important}
#changelist-filter li a{display:block!important;color:var(--fs-muted)!important;font-size:10px!important;padding:6px 14px!important;border-left:2px solid transparent!important}
#changelist-filter li a:hover{color:var(--fs-text)!important;background:rgba(255,255,255,0.03)!important}
#changelist-filter li.selected a{color:var(--fs-accent)!important;border-left-color:var(--fs-accent)!important}

.object-tools{margin:0 0 12px!important}
.object-tools a,.object-tools a:visited{background:var(--fs-surface2)!important;border:1px solid var(--fs-border2)!important;color:var(--fs-muted)!important;border-radius:6px!important;font-size:10px!important;padding:5px 12px!important;display:inline-block!important;margin-left:6px!important}
.object-tools a:hover{color:var(--fs-text)!important}
.object-tools a.addlink{color:var(--fs-accent)!important;border-color:rgba(79,142,247,0.3)!important;background:rgba(79,142,247,0.06)!important}

.form-row{border-bottom:1px solid var(--fs-border)!important;padding:12px 14px!important;background:transparent!important}
.form-row:last-child{border-bottom:none!important}
label{color:var(--fs-muted)!important;font-size:10px!important;font-weight:500!important}
.required label{color:var(--fs-text)!important}
input[type=text],input[type=password],input[type=email],input[type=number],input[type=url],input[type=tel],input[type=date],input[type=datetime-local],textarea,select{background:var(--fs-surface3)!important;border:1px solid var(--fs-border2)!important;color:var(--fs-text)!important;border-radius:6px!important;padding:8px 10px!important;font-size:11px!important;font-family:inherit!important}
input:focus,textarea:focus,select:focus{border-color:var(--fs-accent)!important;outline:none!important;box-shadow:0 0 0 2px rgba(79,142,247,0.12)!important}
input[type=checkbox]{accent-color:var(--fs-accent)!important}
.vCheckboxLabel{color:var(--fs-text)!important;font-size:11px!important}
.help{color:var(--fs-muted)!important;font-size:10px!important;margin-top:4px!important}
.errorlist{margin:4px 0 0!important}
.errorlist li{color:var(--fs-red)!important;font-size:10px!important;background:rgba(239,68,68,0.08)!important;border:1px solid rgba(239,68,68,0.15)!important;border-radius:4px!important;padding:4px 8px!important;margin:2px 0!important;list-style:none!important}

.submit-row{background:var(--fs-surface)!important;border-top:1px solid var(--fs-border)!important;padding:12px 14px!important;display:flex!important;align-items:center!important;gap:8px!important;border-radius:0 0 10px 10px!important}
input[type=submit],.button,a.button{background:var(--fs-accent)!important;color:#fff!important;border:none!important;border-radius:6px!important;padding:7px 14px!important;font-size:11px!important;font-weight:600!important;cursor:pointer!important;font-family:inherit!important}
input[type=submit]:hover{background:#3a7be0!important}
.deletelink,a.deletelink,a.deletelink:visited{background:rgba(239,68,68,0.1)!important;color:var(--fs-red)!important;border:1px solid rgba(239,68,68,0.2)!important;border-radius:6px!important;padding:7px 14px!important;font-size:11px!important;display:inline-block!important}
.deletelink:hover{background:rgba(239,68,68,0.18)!important}

.messagelist{padding:0 20px!important}
.messagelist li{border-radius:8px!important;font-size:11px!important;margin-bottom:8px!important;padding:10px 14px!important;list-style:none!important}
.messagelist .success{background:rgba(34,197,94,0.08)!important;border:1px solid rgba(34,197,94,0.2)!important;color:#4ade80!important}
.messagelist .error{background:rgba(239,68,68,0.08)!important;border:1px solid rgba(239,68,68,0.2)!important;color:#f87171!important}
.messagelist .warning{background:rgba(245,158,11,0.08)!important;border:1px solid rgba(245,158,11,0.2)!important;color:#fbbf24!important}
.messagelist .info{background:rgba(79,142,247,0.08)!important;border:1px solid rgba(79,142,247,0.2)!important;color:#7eb3fa!important}

.inline-group{background:var(--fs-surface2)!important;border:1px solid var(--fs-border)!important;border-radius:10px!important;margin-bottom:14px!important}
.inline-group h2{background:var(--fs-surface)!important;color:var(--fs-muted)!important;font-size:9px!important;text-transform:uppercase!important;letter-spacing:0.1em!important;padding:10px 14px!important;border-bottom:1px solid var(--fs-border)!important;border-radius:10px 10px 0 0!important}
.inline-related{border-top:1px solid var(--fs-border)!important;padding:10px 14px!important}
.add-row a,.add-row a:visited{color:var(--fs-accent)!important;font-size:10px!important}

.calendarbox,.clockbox{background:var(--fs-surface2)!important;border:1px solid var(--fs-border2)!important;border-radius:8px!important;color:var(--fs-text)!important;box-shadow:none!important}
.calendar caption{background:var(--fs-surface)!important;color:var(--fs-muted)!important}
.calendar td a{color:var(--fs-text)!important}
.calendar td.selected a{background:var(--fs-accent)!important;border-radius:4px!important;color:#fff!important}
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}">
    <span class="fs-logo-icon">FS</span>
    <span style="color:var(--fs-accent);font-weight:700;letter-spacing:0.04em;">FOREN</span><span style="color:var(--fs-text);font-weight:700;">SCOPE</span>
    <span style="color:var(--fs-muted);font-size:9px;margin-left:6px;font-weight:400;letter-spacing:0.06em;">ADMIN</span>
  </a>
</h1>
{% endblock %}

{% block nav-global %}{% endblock %}
