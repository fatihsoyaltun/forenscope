server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name forenscope.local;

    ssl_certificate     /etc/ssl/certs/forenscope.crt;
    ssl_certificate_key /etc/ssl/private/forenscope.key;

    client_max_body_size 650M;

    location /static/ {
        alias /opt/forenscope/staticfiles/;
        expires 30d;
    }

    location /media/ {
        internal;
        alias /opt/forenscope/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
